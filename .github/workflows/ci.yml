name: CI

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Use Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Clean install dependencies
        run: |
          rm -rf node_modules
          npm ci

      - name: Verify React and React-DOM versions match
        run: |
          REACT=$(npm ls react --json | jq -r '.dependencies.react.version')
          REACTDOM=$(npm ls react-dom --json | jq -r '.dependencies["react-dom"].version')

          if [ "$REACT" != "$REACTDOM" ]; then
            echo "❌ React ($REACT) and React-DOM ($REACTDOM) versions do not match"
            exit 1
          fi

          echo "✔ React versions match: $REACT"

      - name: Type check
        run: npm run type-check

      - name: Build project
        run: npm run build
